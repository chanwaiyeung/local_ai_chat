# pubspec.yaml — 智讀館 Phase 1 + Phase 2 (mobile + local server in one project).
#
# Bootstrap on a fresh machine:
#
#   flutter create --org com.example --project-name ai_library_server .
#   flutter pub get
#
# To run only the analyzer / tests (no need for android/ios scaffolding):
#
#   flutter pub get
#   flutter analyze
#   flutter test

name: local_ai_chat
description: 智讀館 — Local AI library reader + server.
publish_to: 'none'
version: 2.5.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  archive: ^3.6.1   # ZIP / CBZ unpacking
  # Document loaders for the indexer.
  epubx: ^4.0.0     # pure-Dart EPUB parser
  file_picker: ^8.3.7
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_highlight: ^0.7.0
  flutter_localizations:
    sdk: flutter
  flutter_markdown_plus: ^1.0.3
  flutter_tts: ^4.2.5
  html: ^0.15.4     # HTML → text for EPUB chapter content
  # HTTP client (mobile + LLM client).
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  markdown: ^7.3.0
  # Path manipulation (basename, join) for the indexing CLI / RAG.
  path: ^1.9.1
  # Cross-platform application support directory (used by VectorStore for vector_store.json).
  path_provider: ^2.1.0
  # HTTP server stack.
  shelf: ^1.4.2
  shelf_cors_headers: ^0.1.5
  shelf_router: ^1.1.4
  speech_to_text: ^7.3.0
  syncfusion_flutter_pdf: ^33.2.4
  teledart: ^1.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true
  generate: true
