# pubspec.yaml — 智讀館 Phase 1 + Phase 2 (mobile + local server in one project).
#
# Bootstrap on a fresh machine:
#
#   flutter create --org com.example --project-name ai_library_server .
#   flutter pub get
#
# To run only the analyzer / tests (no need for android/ios scaffolding):
#
#   flutter pub get
#   flutter analyze
#   flutter test

name: ai_library_server
description: 智讀館 — Local AI library reader + server.
publish_to: 'none'
version: 2.0.0

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  archive: ^3.6.1   # ZIP / CBZ unpacking
  # Document loaders for the indexer.
  epubx: ^4.0.0     # pure-Dart EPUB parser
  flutter:
    sdk: flutter
  flutter_tts: ^4.2.5
  html: ^0.15.4     # HTML → text for EPUB chapter content
  # HTTP client (mobile + LLM client).
  http: ^1.2.2
  # Path manipulation (basename, join) for the indexing CLI / RAG.
  path: ^1.9.1
  # HTTP server stack.
  shelf: ^1.4.2
  shelf_cors_headers: ^0.1.5
  shelf_router: ^1.1.4

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
